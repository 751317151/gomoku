<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>五子棋对战 · Gomoku Online</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<!-- RECONNECT BAR -->
<div class="reconnect-bar" id="reconnect-bar">连接断开，尝试重连中...</div>

<!-- CONFIRM DIALOG -->
<div class="confirm-overlay" id="confirm-dialog">
  <div class="confirm-box">
    <p id="confirm-msg">确定要认输吗？</p>
    <div class="confirm-btns">
      <button class="btn-ok" id="confirm-ok">确定</button>
      <button class="btn-cancel" id="confirm-cancel">取消</button>
    </div>
  </div>
</div>

<!-- LOGIN SCREEN -->
<div id="login-screen">
  <div class="login-box">
    <div class="login-title">五子棋</div>
    <div class="login-sub">GOMOKU ONLINE · 在线对战</div>

    <input type="hidden" id="ws-url" value="" data-port="9001">
    <div class="field-label">你的昵称</div>
    <input class="field-input" type="text" id="player-name" placeholder="输入昵称..." maxlength="16">

    <button class="btn-join" onclick="joinGame()">进入对战</button>
  </div>
</div>

<!-- HEADER -->
<header>
  <div class="logo">五子棋 <span>ONLINE</span></div>
  <div class="server-status">
    <div class="status-dot" id="status-dot"></div>
    <span id="status-text">未连接</span>
  </div>
</header>

<!-- MAIN -->
<div id="lobby-screen">
  <div class="lobby-header">
    <div class="lobby-title">游戏大厅</div>
    <div>
      <button class="btn-outline" onclick="refreshRooms()">刷新列表</button>
      <button class="btn-outline" style="background:var(--accent);color:var(--bg)" onclick="createRoom()">快速开始</button>
    </div>
  </div>
  <div class="room-list" id="room-list-container">
    <!-- 房间卡片动态生成 -->
  </div>
</div>

<main id="game-screen" style="display:none;">

  <!-- LEFT: PLAYERS -->
  <div>
    <div class="panel" style="margin-bottom:16px">
      <div class="panel-title">对战玩家</div>
      <div id="player-black">
        <div class="waiting-slot">等待玩家...</div>
      </div>
      <div id="player-white">
        <div class="waiting-slot">等待玩家...</div>
      </div>
    </div>

    <div class="panel">
      <div class="panel-title">
        <span style="flex:1">房间信息</span>
        <button class="leave-btn" onclick="leaveRoom()">离开</button>
        
      </div>
      <div class="room-info">
        <div class="room-id" id="room-id">ROOM: —</div>
        <div class="move-count" id="move-count">落子数: 0</div>
        <div class="move-count" id="spectator-count" style="margin-top:4px;color:var(--accent2)">观众数: 0</div>
      </div>
      <div class="status-area waiting" id="status-msg">等待连接...</div>
      <div style="padding:4px 16px 8px;display:none" id="surrender-row"><button class="leave-btn" id="surrender-btn" onclick="surrender()" style="width:100%;border-color:var(--accent);color:var(--accent)">认输</button></div>
    </div>
  </div>

  <!-- CENTER: BOARD -->
  <div class="board-container">
    <div class="board-wrapper">
      <canvas id="board-canvas"></canvas>
      <div id="gameover-overlay">
        <div class="gameover-result" id="gameover-result">胜利！</div>
        <div class="gameover-sub" id="gameover-sub"></div>
        <div class="gameover-scores" id="gameover-scores"></div>
        <div class="gameover-btns">
          <button class="btn-review" onclick="dismissOverlay()">查看棋盘</button>
          <button class="btn-restart" onclick="requestRestart()">再来一局</button>
        </div>
      </div>
    </div>
    <div id="restart-bar" style="display:none;justify-content:center;padding:8px 0;gap:12px;">
      <button class="btn-restart" onclick="requestRestart()">再来一局</button>
    </div>
    <div class="board-footer" id="board-footer">15×15 标准五子棋 · 黑棋先手</div>
  </div>

  <!-- RIGHT: CHAT -->
  <div class="panel">
    <div class="panel-title">对战聊天</div>
    <div class="chat-messages" id="chat-messages">
      <div class="chat-msg system">欢迎来到五子棋对战！</div>
    </div>
    <div class="chat-input-row">
      <input class="chat-input" type="text" id="chat-input"
        placeholder="发送消息..." maxlength="100"
        onkeydown="if(event.key==='Enter') sendChat()">
      <button class="chat-send" onclick="sendChat()">↑</button>
    </div>
  </div>

</main>

<script src="app.js"></script>
</body>
</html>
