<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>五子棋对战 · Gomoku Online</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;700;900&family=JetBrains+Mono:wght@400;600&display=swap');

  :root {
    --bg: #0d0d0d;
    --surface: #161616;
    --border: #2a2a2a;
    --board-bg: #c9a96e;
    --board-dark: #a07c42;
    --board-line: #7a5c2e;
    --black-stone: #1a1a1a;
    --white-stone: #f0ede8;
    --accent: #d4a843;
    --accent2: #e8c878;
    --red: #e05555;
    --green: #55b855;
    --text: #e8e2d6;
    --text-dim: #888;
    --glow: rgba(212,168,67,0.4);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Noto Serif SC', serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    overflow-x: hidden;
  }

  /* === HEADER === */
  header {
    width: 100%;
    padding: 20px 40px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    border-bottom: 1px solid var(--border);
    background: linear-gradient(180deg, rgba(212,168,67,0.05) 0%, transparent 100%);
  }

  .logo {
    font-size: 1.6rem;
    font-weight: 900;
    letter-spacing: 0.1em;
    color: var(--accent);
    text-shadow: 0 0 20px var(--glow);
  }

  .logo span { color: var(--text); }

  .server-status {
    display: flex;
    align-items: center;
    gap: 8px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.75rem;
    color: var(--text-dim);
  }

  .status-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--red);
    transition: background 0.3s;
  }
  .status-dot.connected { background: var(--green); box-shadow: 0 0 6px var(--green); }

  /* === MAIN LAYOUT === */
  main {
    width: 100%;
    max-width: 1100px;
    padding: 30px 20px;
    display: grid;
    grid-template-columns: 220px 1fr 220px;
    gap: 24px;
    align-items: start;
  }

  /* === PANELS === */
  .panel {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 4px;
    overflow: hidden;
  }

  .panel-title {
    padding: 12px 16px;
    font-size: 0.7rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--accent);
    border-bottom: 1px solid var(--border);
    font-family: 'JetBrains Mono', monospace;
  }

  /* === LOGIN SCREEN === */
  #login-screen {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.92);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 1000;
    backdrop-filter: blur(4px);
  }

  .login-box {
    background: var(--surface);
    border: 1px solid var(--border);
    padding: 48px;
    width: 380px;
    position: relative;
  }

  .login-box::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: linear-gradient(90deg, transparent, var(--accent), transparent);
  }

  .login-title {
    font-size: 2.2rem;
    font-weight: 900;
    color: var(--accent);
    text-align: center;
    margin-bottom: 8px;
    text-shadow: 0 0 30px var(--glow);
  }

  .login-sub {
    text-align: center;
    color: var(--text-dim);
    font-size: 0.85rem;
    margin-bottom: 36px;
  }

  .field-label {
    font-size: 0.7rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--text-dim);
    margin-bottom: 8px;
    font-family: 'JetBrains Mono', monospace;
  }

  .field-input {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 12px 16px;
    font-size: 1rem;
    font-family: 'Noto Serif SC', serif;
    outline: none;
    margin-bottom: 24px;
    transition: border-color 0.2s;
  }

  .field-input:focus { border-color: var(--accent); }

  .btn-join {
    width: 100%;
    background: var(--accent);
    color: var(--bg);
    border: none;
    padding: 14px;
    font-size: 1rem;
    font-family: 'Noto Serif SC', serif;
    font-weight: 700;
    cursor: pointer;
    letter-spacing: 0.15em;
    transition: all 0.2s;
  }

  .btn-join:hover { background: var(--accent2); box-shadow: 0 0 20px var(--glow); }

  .ws-url-field {
    margin-bottom: 20px;
  }

  /* === PLAYER CARD === */
  .player-card {
    padding: 16px;
    display: flex;
    flex-direction: column;
    gap: 8px;
    border-bottom: 1px solid var(--border);
    transition: background 0.3s;
  }

  .player-card.active { background: rgba(212,168,67,0.05); }

  .player-card-top {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .stone-icon {
    width: 24px; height: 24px;
    border-radius: 50%;
    flex-shrink: 0;
    position: relative;
  }

  .stone-icon.black {
    background: radial-gradient(circle at 35% 35%, #555, #111);
    box-shadow: 0 2px 6px rgba(0,0,0,0.8), inset 0 1px 1px rgba(255,255,255,0.15);
  }

  .stone-icon.white {
    background: radial-gradient(circle at 35% 35%, #fff, #d0ccc4);
    box-shadow: 0 2px 6px rgba(0,0,0,0.6), inset 0 1px 1px rgba(255,255,255,0.9);
  }

  .player-name {
    font-weight: 700;
    font-size: 0.95rem;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .player-name.you { color: var(--accent); }

  .player-stats {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.7rem;
    color: var(--text-dim);
    display: flex;
    gap: 12px;
  }

  .turn-badge {
    font-size: 0.65rem;
    padding: 2px 8px;
    background: var(--accent);
    color: var(--bg);
    font-family: 'JetBrains Mono', monospace;
    letter-spacing: 0.1em;
    display: inline-block;
    width: fit-content;
    animation: pulse 1.5s infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.6; }
  }

  .waiting-slot {
    padding: 16px;
    color: var(--text-dim);
    font-size: 0.85rem;
    text-align: center;
    border-bottom: 1px solid var(--border);
  }

  /* === STATUS AREA === */
  .status-area {
    padding: 12px 16px;
    font-size: 0.85rem;
    min-height: 44px;
    display: flex;
    align-items: center;
  }

  .status-area.your-turn { color: var(--accent); font-weight: 700; }
  .status-area.opponent-turn { color: var(--text-dim); }
  .status-area.waiting { color: var(--text-dim); }
  .status-area.win { color: var(--green); font-weight: 700; }
  .status-area.lose { color: var(--red); }
  .status-area.draw { color: var(--accent2); }

  /* === BOARD === */
  .board-container {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 16px;
  }

  #board-canvas {
    cursor: crosshair;
    display: block;
    box-shadow: 0 0 40px rgba(0,0,0,0.8), 0 0 80px rgba(212,168,67,0.1);
  }

  .board-footer {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.7rem;
    color: var(--text-dim);
    letter-spacing: 0.1em;
  }

  /* === LOBBY SCREEN === */
  #lobby-screen {
    display: none;
    width: 100%;
    max-width: 900px;
    margin: 40px auto;
    padding: 0 20px;
  }

  .lobby-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 24px;
  }

  .lobby-title {
    font-size: 1.5rem;
    color: var(--accent);
    font-weight: 700;
  }

  .btn-outline {
    background: transparent;
    border: 1px solid var(--accent);
    color: var(--accent);
    padding: 8px 16px;
    cursor: pointer;
    font-family: 'Noto Serif SC', serif;
    transition: all 0.2s;
  }
  
  .btn-outline:hover {
    background: var(--accent);
    color: var(--bg);
  }

  .room-list {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 16px;
  }

  .room-card {
    background: var(--surface);
    border: 1px solid var(--border);
    padding: 16px;
    border-radius: 4px;
    transition: transform 0.2s, border-color 0.2s;
  }

  .room-card:hover {
    border-color: var(--accent);
    transform: translateY(-2px);
  }

  .room-card-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 12px;
    border-bottom: 1px solid var(--border);
    padding-bottom: 8px;
  }

  .room-card-id {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.9rem;
    color: var(--text);
  }

  .room-card-state {
    font-size: 0.75rem;
    padding: 2px 6px;
    border-radius: 2px;
  }
  
  .state-waiting { background: rgba(85, 184, 85, 0.2); color: var(--green); }
  .state-playing { background: rgba(212, 168, 67, 0.2); color: var(--accent); }

  .room-card-info {
    font-size: 0.85rem;
    color: var(--text-dim);
    margin-bottom: 16px;
    line-height: 1.6;
  }

  .room-card-actions {
    display: flex;
    gap: 8px;
  }
  
  .room-card-actions button {
    flex: 1;
  }

  .leave-btn {
    background: transparent;
    border: 1px solid var(--red);
    color: var(--red);
    padding: 6px 12px;
    font-size: 0.8rem;
    cursor: pointer;
    font-family: 'Noto Serif SC', serif;
  }
  .leave-btn:hover { background: var(--red); color: white; }

  /* === GAME OVER OVERLAY === */
  #gameover-overlay {
    display: none;
    position: absolute;
    inset: 0;
    background: rgba(0,0,0,0.85);
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 20px;
    z-index: 10;
    backdrop-filter: blur(6px);
  }

  #gameover-overlay.show { display: flex; }

  .gameover-result {
    font-size: 2.5rem;
    font-weight: 900;
    letter-spacing: 0.1em;
  }

  .gameover-result.win { color: var(--accent); text-shadow: 0 0 30px var(--glow); }
  .gameover-result.lose { color: var(--red); }
  .gameover-result.draw { color: var(--accent2); }

  .gameover-sub { color: var(--text-dim); font-size: 0.9rem; }

  .gameover-scores {
    display: flex;
    gap: 32px;
    font-family: 'JetBrains Mono', monospace;
  }

  .score-item { text-align: center; }
  .score-num { font-size: 2rem; color: var(--accent); font-weight: 700; }
  .score-label { font-size: 0.7rem; color: var(--text-dim); letter-spacing: 0.1em; }

  .btn-restart {
    background: transparent;
    border: 1px solid var(--accent);
    color: var(--accent);
    padding: 10px 28px;
    font-family: 'Noto Serif SC', serif;
    font-size: 0.9rem;
    cursor: pointer;
    letter-spacing: 0.15em;
    transition: all 0.2s;
  }

  .btn-restart:hover { background: var(--accent); color: var(--bg); }

  /* === CHAT === */
  .chat-messages {
    height: 260px;
    overflow-y: auto;
    padding: 12px;
    display: flex;
    flex-direction: column;
    gap: 8px;
    scrollbar-width: thin;
    scrollbar-color: var(--border) transparent;
  }

  .chat-msg {
    font-size: 0.82rem;
    line-height: 1.5;
    word-break: break-all;
  }

  .chat-msg .msg-name { color: var(--accent); font-weight: 700; }
  .chat-msg .msg-name.me { color: var(--accent2); }
  .chat-msg.system { color: var(--text-dim); font-style: italic; font-size: 0.75rem; }

  .chat-input-row {
    display: flex;
    border-top: 1px solid var(--border);
  }

  .chat-input {
    flex: 1;
    background: transparent;
    border: none;
    color: var(--text);
    padding: 10px 12px;
    font-size: 0.82rem;
    font-family: 'Noto Serif SC', serif;
    outline: none;
  }

  .chat-send {
    background: transparent;
    border: none;
    border-left: 1px solid var(--border);
    color: var(--accent);
    padding: 0 14px;
    cursor: pointer;
    font-size: 1rem;
    transition: background 0.2s;
  }

  .chat-send:hover { background: rgba(212,168,67,0.1); }

  /* === ROOM INFO === */
  .room-info { padding: 12px 16px; }

  .room-id {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.75rem;
    color: var(--text-dim);
    margin-bottom: 8px;
  }

  .move-count {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.75rem;
    color: var(--text-dim);
  }

  .board-wrapper {
    position: relative;
  }
</style>
</head>
<body>

<!-- LOGIN SCREEN -->
<div id="login-screen">
  <div class="login-box">
    <div class="login-title">五子棋</div>
    <div class="login-sub">GOMOKU ONLINE · 在线对战</div>

    <div class="ws-url-field">
      <div class="field-label">服务器地址</div>
      <input class="field-input" type="text" id="ws-url" value="" placeholder="ws://localhost:8887">
    </div>

    <div class="field-label">你的昵称</div>
    <input class="field-input" type="text" id="player-name" placeholder="输入昵称..." maxlength="16">

    <button class="btn-join" onclick="joinGame()">进入对战</button>
  </div>
</div>

<!-- HEADER -->
<header>
  <div class="logo">五子棋 <span>ONLINE</span></div>
  <div class="server-status">
    <div class="status-dot" id="status-dot"></div>
    <span id="status-text">未连接</span>
  </div>
</header>

<!-- MAIN -->
<div id="lobby-screen">
  <div class="lobby-header">
    <div class="lobby-title">游戏大厅</div>
    <div>
      <button class="btn-outline" onclick="refreshRooms()">刷新列表</button>
      <button class="btn-outline" style="background:var(--accent);color:var(--bg)" onclick="createRoom()">快速开始</button>
    </div>
  </div>
  <div class="room-list" id="room-list-container">
    <!-- 房间卡片动态生成 -->
  </div>
</div>

<main id="game-screen" style="display:none;">

  <!-- LEFT: PLAYERS -->
  <div>
    <div class="panel" style="margin-bottom:16px">
      <div class="panel-title">对战玩家</div>
      <div id="player-black">
        <div class="waiting-slot">等待玩家...</div>
      </div>
      <div id="player-white">
        <div class="waiting-slot">等待玩家...</div>
      </div>
    </div>

    <div class="panel">
      <div class="panel-title">
        <span style="flex:1">房间信息</span>
        <button class="leave-btn" onclick="leaveRoom()">离开</button>
      </div>
      <div class="room-info">
        <div class="room-id" id="room-id">ROOM: —</div>
        <div class="move-count" id="move-count">落子数: 0</div>
        <div class="move-count" id="spectator-count" style="margin-top:4px;color:var(--accent2)">观众数: 0</div>
      </div>
      <div class="status-area waiting" id="status-msg">等待连接...</div>
    </div>
  </div>

  <!-- CENTER: BOARD -->
  <div class="board-container">
    <div class="board-wrapper">
      <canvas id="board-canvas"></canvas>
      <div id="gameover-overlay">
        <div class="gameover-result" id="gameover-result">胜利！</div>
        <div class="gameover-sub" id="gameover-sub"></div>
        <div class="gameover-scores" id="gameover-scores"></div>
        <button class="btn-restart" onclick="requestRestart()">再来一局</button>
      </div>
    </div>
    <div class="board-footer" id="board-footer">15×15 标准五子棋 · 黑棋先手</div>
  </div>

  <!-- RIGHT: CHAT -->
  <div class="panel">
    <div class="panel-title">对战聊天</div>
    <div class="chat-messages" id="chat-messages">
      <div class="chat-msg system">欢迎来到五子棋对战！</div>
    </div>
    <div class="chat-input-row">
      <input class="chat-input" type="text" id="chat-input"
        placeholder="发送消息..." maxlength="100"
        onkeydown="if(event.key==='Enter') sendChat()">
      <button class="chat-send" onclick="sendChat()">↑</button>
    </div>
  </div>

</main>

<script>
// ============================================================
// 游戏常量
// ============================================================
const BOARD_SIZE = 15;
const CELL = 40;
const PADDING = 30;
const CANVAS_SIZE = PADDING * 2 + CELL * (BOARD_SIZE - 1);

// ============================================================
// 游戏状态
// ============================================================
let ws = null;
let myId = null;
let myName = '';
let myStone = 0;   // 1=黑, 2=白
let roomId = '';
let gameState = 'LOBBY'; // LOBBY | WAITING | PLAYING | OVER | SPECTATING
let currentTurn = 1; // 1=黑, 2=白
let moveCount = 0;
let board = Array.from({length: BOARD_SIZE}, () => new Array(BOARD_SIZE).fill(0));
let lastMove = null;
let players = {};
let myWins = 0, myLosses = 0;

// ============================================================
// 棋盘绘制
// ============================================================
const canvas = document.getElementById('board-canvas');
const ctx = canvas.getContext('2d');
canvas.width = CANVAS_SIZE;
canvas.height = CANVAS_SIZE;

function drawBoard() {
  // 木纹背景
  const grad = ctx.createLinearGradient(0, 0, CANVAS_SIZE, CANVAS_SIZE);
  grad.addColorStop(0, '#c9a55e');
  grad.addColorStop(0.5, '#d4b070');
  grad.addColorStop(1, '#b8914a');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, CANVAS_SIZE, CANVAS_SIZE);

  // 木纹纹理
  ctx.strokeStyle = 'rgba(100,60,10,0.06)';
  ctx.lineWidth = 1;
  for (let i = 0; i < CANVAS_SIZE; i += 4) {
    ctx.beginPath();
    ctx.moveTo(0, i + Math.sin(i*0.05)*3);
    ctx.lineTo(CANVAS_SIZE, i + Math.sin(i*0.05+1)*3);
    ctx.stroke();
  }

  // 棋盘线
  ctx.strokeStyle = '#7a5c2e';
  ctx.lineWidth = 0.8;

  for (let i = 0; i < BOARD_SIZE; i++) {
    const x = PADDING + i * CELL;
    const y = PADDING + i * CELL;

    ctx.beginPath();
    ctx.moveTo(x, PADDING);
    ctx.lineTo(x, PADDING + (BOARD_SIZE-1)*CELL);
    ctx.stroke();

    ctx.beginPath();
    ctx.moveTo(PADDING, y);
    ctx.lineTo(PADDING + (BOARD_SIZE-1)*CELL, y);
    ctx.stroke();
  }

  // 边框
  ctx.strokeStyle = '#6a4c1e';
  ctx.lineWidth = 2;
  ctx.strokeRect(PADDING, PADDING, (BOARD_SIZE-1)*CELL, (BOARD_SIZE-1)*CELL);

  // 星位（天元和四个角星）
  const stars = [[7,7],[3,3],[3,11],[11,3],[11,11]];
  stars.forEach(([r,c]) => {
    ctx.fillStyle = '#6a4c1e';
    ctx.beginPath();
    ctx.arc(PADDING + c*CELL, PADDING + r*CELL, 4, 0, Math.PI*2);
    ctx.fill();
  });

  // 坐标标注
  ctx.fillStyle = 'rgba(80,50,15,0.7)';
  ctx.font = '10px JetBrains Mono, monospace';
  ctx.textAlign = 'center';
  const letters = 'ABCDEFGHJKLMNOP';
  for (let i = 0; i < BOARD_SIZE; i++) {
    ctx.fillText(letters[i], PADDING + i*CELL, PADDING - 10);
    ctx.fillText(i+1, PADDING - 18, PADDING + i*CELL + 4);
  }

  // 绘制所有棋子
  for (let r = 0; r < BOARD_SIZE; r++) {
    for (let c = 0; c < BOARD_SIZE; c++) {
      if (board[r][c] !== 0) {
        drawStone(r, c, board[r][c], lastMove && lastMove[0]===r && lastMove[1]===c);
      }
    }
  }
}

function drawStone(row, col, stone, isLast=false) {
  const x = PADDING + col * CELL;
  const y = PADDING + row * CELL;
  const r = CELL * 0.44;

  ctx.save();

  // 阴影
  ctx.shadowColor = 'rgba(0,0,0,0.5)';
  ctx.shadowBlur = 8;
  ctx.shadowOffsetX = 2;
  ctx.shadowOffsetY = 3;

  // 棋子渐变
  const grad = ctx.createRadialGradient(x-r*0.3, y-r*0.3, 0, x, y, r);
  if (stone === 1) {
    grad.addColorStop(0, '#666');
    grad.addColorStop(0.4, '#222');
    grad.addColorStop(1, '#0a0a0a');
  } else {
    grad.addColorStop(0, '#ffffff');
    grad.addColorStop(0.5, '#eeebe4');
    grad.addColorStop(1, '#c8c4bc');
  }

  ctx.fillStyle = grad;
  ctx.beginPath();
  ctx.arc(x, y, r, 0, Math.PI*2);
  ctx.fill();
  ctx.shadowColor = 'transparent';

  // 高光
  const hiGrad = ctx.createRadialGradient(x-r*0.35, y-r*0.35, 0, x, y, r*0.8);
  hiGrad.addColorStop(0, stone===1 ? 'rgba(255,255,255,0.2)' : 'rgba(255,255,255,0.7)');
  hiGrad.addColorStop(1, 'transparent');
  ctx.fillStyle = hiGrad;
  ctx.beginPath();
  ctx.arc(x, y, r, 0, Math.PI*2);
  ctx.fill();

  // 最后落子标记
  if (isLast) {
    ctx.fillStyle = stone===1 ? 'rgba(255,80,80,0.9)' : 'rgba(220,60,60,0.9)';
    ctx.beginPath();
    ctx.arc(x, y, r*0.25, 0, Math.PI*2);
    ctx.fill();
  }

  ctx.restore();
}

// 落子预览
canvas.addEventListener('mousemove', function(e) {
  if (gameState !== 'PLAYING' || currentTurn !== myStone) return;
  const rect = canvas.getBoundingClientRect();
  const scaleX = canvas.width / rect.width;
  const scaleY = canvas.height / rect.height;
  const mx = (e.clientX - rect.left) * scaleX;
  const my = (e.clientY - rect.top) * scaleY;
  const col = Math.round((mx - PADDING) / CELL);
  const row = Math.round((my - PADDING) / CELL);

  drawBoard();
  if (row >= 0 && row < BOARD_SIZE && col >= 0 && col < BOARD_SIZE && board[row][col] === 0) {
    const x = PADDING + col * CELL;
    const y = PADDING + row * CELL;
    ctx.save();
    ctx.globalAlpha = 0.4;
    ctx.fillStyle = myStone === 1 ? '#111' : '#eee';
    ctx.beginPath();
    ctx.arc(x, y, CELL*0.44, 0, Math.PI*2);
    ctx.fill();
    ctx.restore();
  }
});

canvas.addEventListener('mouseleave', drawBoard);

canvas.addEventListener('click', function(e) {
  if (gameState !== 'PLAYING' || currentTurn !== myStone) return;
  const rect = canvas.getBoundingClientRect();
  const scaleX = canvas.width / rect.width;
  const scaleY = canvas.height / rect.height;
  const mx = (e.clientX - rect.left) * scaleX;
  const my = (e.clientY - rect.top) * scaleY;
  const col = Math.round((mx - PADDING) / CELL);
  const row = Math.round((my - PADDING) / CELL);

  if (row < 0 || row >= BOARD_SIZE || col < 0 || col >= BOARD_SIZE) return;
  if (board[row][col] !== 0) return;

  sendMove(row, col);
});

// ============================================================
// WebSocket 通信
// ============================================================
function joinGame() {
  const url = document.getElementById('ws-url').value.trim() || 'ws://localhost:8887';
  myName = document.getElementById('player-name').value.trim() || '匿名玩家';

  connect(url);
}

function connect(url) {
  try {
    ws = new WebSocket(url);
  } catch (e) {
    alert('WebSocket 地址无效：' + url);
    return;
  }

  ws.onopen = () => {
    setStatus(true, '已连接');
    document.getElementById('login-screen').style.display = 'none';
    showLobby();
    refreshRooms();
  };

  ws.onmessage = (e) => {
    try {
      const msg = JSON.parse(e.data);
      handleMessage(msg);
    } catch(err) {
      console.error('消息解析失败', err);
    }
  };

  ws.onclose = () => {
    setStatus(false, '已断开');
    gameState = 'LOBBY';
    showLogin();
  };

  ws.onerror = () => {
    setStatus(false, '连接失败');
  };
}

function showLogin() {
  document.getElementById('login-screen').style.display = 'flex';
  document.getElementById('lobby-screen').style.display = 'none';
  document.getElementById('game-screen').style.display = 'none';
}

function showLobby() {
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('lobby-screen').style.display = 'block';
  document.getElementById('game-screen').style.display = 'none';
  gameState = 'LOBBY';
}

function showGame() {
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('lobby-screen').style.display = 'none';
  document.getElementById('game-screen').style.display = 'grid';
  document.getElementById('chat-messages').innerHTML = '<div class="chat-msg system">欢迎来到五子棋对战！</div>';
}

function refreshRooms() {
  send({ type: 'GET_ROOMS' });
}

function createRoom() {
  send({ type: 'JOIN', playerName: myName });
  showGame();
}

function joinSpecificRoom(id) {
  send({ type: 'JOIN', playerName: myName, roomId: id });
  showGame();
}

function spectateRoom(id) {
  send({ type: 'SPECTATE', playerName: myName, roomId: id });
  showGame();
}

function leaveRoom() {
  send({ type: 'LEAVE' });
  showLobby();
}

function addAI() {
  send({ type: 'ADD_AI' });
}

function send(obj) {
  if (ws && ws.readyState === WebSocket.OPEN) {
    ws.send(JSON.stringify(obj));
  }
}

function sendMove(row, col) {
  send({ type: 'MOVE', row, col });
}

function sendChat() {
  const input = document.getElementById('chat-input');
  const msg = input.value.trim();
  if (!msg) return;
  send({ type: 'CHAT', message: msg });
  input.value = '';
}

function requestRestart() {
  document.getElementById('gameover-overlay').classList.remove('show');
  if (myId === 'SPECTATOR') return;

  if (gameState === 'OVER') {
    send({ type: 'RESTART' });
  } else if (gameState === 'WAITING') {
    board = Array.from({length: BOARD_SIZE}, () => new Array(BOARD_SIZE).fill(0));
    moveCount = 0;
    lastMove = null;
    document.getElementById('move-count').textContent = '落子数: 0';
    drawBoard();
  }
}

// ============================================================
// 消息处理
// ============================================================
function handleMessage(msg) {
  switch (msg.type) {
    case 'ROOM_LIST':
      handleRoomList(msg);
      break;

    case 'ROOM_INFO':
      handleRoomInfo(msg);
      break;

    case 'WAITING':
      gameState = 'WAITING';
      if (msg.playerId) myId = msg.playerId;
      let wMsg = msg.message;
      if (!wMsg) {
        wMsg = (myId === 'SPECTATOR') ? '等待玩家加入...' : '等待对手加入...';
      }
      setStatusMsg(wMsg, 'waiting');
      addChat(wMsg, 'system');
      updatePlayerPanel();
      break;

    case 'GAME_START':
      handleGameStart(msg);
      break;

    case 'GAME_SYNC':
      handleGameSync(msg);
      break;

    case 'GAME_MOVE':
      handleGameMove(msg);
      break;

    case 'GAME_OVER':
      handleGameOver(msg);
      break;

    case 'GAME_CHAT':
      handleGameChat(msg);
      break;

    case 'ERROR':
      alert('错误：' + msg.message);
      if (msg.message === '房间内玩家已全部离开，房间解散' || msg.message.includes('失败') || msg.message.includes('不存在') || msg.message.includes('已满')) {
        showLobby();
      }
      break;
  }
}

function handleRoomInfo(msg) {
  if (msg.roomId) {
    roomId = msg.roomId;
    document.getElementById('room-id').textContent = 'ROOM: ' + roomId;
  }
  try {
    const data = JSON.parse(msg.data);
    players = {};
    if (data.players && Array.isArray(data.players)) {
      data.players.forEach(p => { players[p.id] = p; });
    }
    const spectatorEl = document.getElementById('spectator-count');
    if (spectatorEl) spectatorEl.textContent = '观众数: ' + (data.spectatorCount || 0);
    
    updatePlayerPanel();
  } catch(e) {
    console.error('handleRoomInfo error', e);
  }
}

function handleRoomList(msg) {
  const container = document.getElementById('room-list-container');
  try {
    const list = JSON.parse(msg.data);
    if (list.length === 0) {
      container.innerHTML = '<div style="color:var(--text-dim);grid-column:1/-1;text-align:center;padding:40px;">暂无游戏房间，你可以点击"快速开始"创建房间</div>';
      return;
    }
    
    let html = '';
    list.forEach(r => {
      const isPlaying = r.state === 'PLAYING';
      const isFull = r.playerCount >= 2;
      const stateClass = isPlaying ? 'state-playing' : 'state-waiting';
      const stateText = isPlaying ? '对战中' : '等待中';
      
      let playersHtml = r.players.length > 0 ? r.players.join(' vs ') : '空房间';
      
      html += `
        <div class="room-card">
          <div class="room-card-header">
            <span class="room-card-id">${r.roomId}</span>
            <span class="room-card-state ${stateClass}">${stateText}</span>
          </div>
          <div class="room-card-info">
            <div>玩家: ${playersHtml}</div>
            <div style="font-size:0.75rem;margin-top:4px;">人数: ${r.playerCount}/2 | 观众: ${r.spectatorCount}</div>
          </div>
          <div class="room-card-actions">
            ${!isFull && !isPlaying ? `<button class="btn-outline" onclick="joinSpecificRoom('${r.roomId}')">加入</button>` : ''}
            <button class="btn-outline" style="border-color:#555;color:#ccc;" onclick="spectateRoom('${r.roomId}')">观战</button>
          </div>
        </div>
      `;
    });
    container.innerHTML = html;
  } catch(e) {
    console.error(e);
  }
}

function handleGameSync(msg) {
  roomId = msg.roomId;
  gameState = 'SPECTATING';
  myId = 'SPECTATOR';
  
  try {
    const data = JSON.parse(msg.data);
    
    // 恢复玩家信息
    players = {};
    data.roomData.players.forEach(p => { players[p.id] = p; });
    currentTurn = data.roomData.currentTurn;
    document.getElementById('spectator-count').textContent = '观众数: ' + (data.roomData.spectatorCount || 0);
    
    // 恢复棋盘
    board = data.board;
    
    // 重新计算 moveCount
    moveCount = 0;
    for(let r=0; r<BOARD_SIZE; r++) {
        for(let c=0; c<BOARD_SIZE; c++) {
            if(board[r][c] !== 0) moveCount++;
        }
    }
  } catch(e) {}

  document.getElementById('room-id').textContent = 'ROOM: ' + roomId + ' (观战中)';
  document.getElementById('move-count').textContent = '落子数: ' + moveCount;
  document.getElementById('gameover-overlay').classList.remove('show');

  updatePlayerPanel();
  setStatusMsg('观战中', 'waiting');
  drawBoard();

  addChat(`系统：${msg.message}`, 'system');
}

function handleGameStart(msg) {
  myId = msg.playerId;
  myStone = msg.stone;
  roomId = msg.roomId;
  gameState = 'PLAYING';
  currentTurn = 1; // 黑棋先
  moveCount = 0;
  board = Array.from({length: BOARD_SIZE}, () => new Array(BOARD_SIZE).fill(0));
  lastMove = null;

  // 解析房间数据
  try {
    const data = JSON.parse(msg.data);
    data.players.forEach(p => { players[p.id] = p; });
    currentTurn = data.currentTurn;
    document.getElementById('spectator-count').textContent = '观众数: ' + (data.spectatorCount || 0);
  } catch(e) {}

  document.getElementById('room-id').textContent = 'ROOM: ' + roomId;
  document.getElementById('gameover-overlay').classList.remove('show');

  updatePlayerPanel();
  updateTurnStatus();
  drawBoard();

  addChat(`游戏开始！你执${myStone===1?'黑':'白'}棋，对手：${msg.message}`, 'system');
}

function handleGameMove(msg) {
  const r = msg.row, c = msg.col;
  board[r][c] = msg.stone;
  lastMove = [r, c];
  currentTurn = parseInt(msg.data) || (msg.stone === 1 ? 2 : 1);
  moveCount++;

  document.getElementById('move-count').textContent = '落子数: ' + moveCount;
  updateTurnStatus();
  drawBoard();
}

function handleGameOver(msg) {
  gameState = 'OVER';
  const overlay = document.getElementById('gameover-overlay');
  const result = document.getElementById('gameover-result');
  const sub = document.getElementById('gameover-sub');
  const scores = document.getElementById('gameover-scores');

  const isSpectator = myId === 'SPECTATOR';
  const isDraw = msg.winner === 'draw';
  const isWin = msg.winner === myId;

  if (isSpectator) {
    result.className = 'gameover-result ' + (isDraw ? 'draw' : 'win');
    if (isDraw) {
      result.textContent = '平  局';
      setStatusMsg('游戏结束：平局', 'draw');
    } else {
      const winnerName = players[msg.winner] ? players[msg.winner].name : '玩家';
      result.textContent = winnerName + ' 获胜';
      setStatusMsg('游戏结束：' + winnerName + ' 获胜', 'win');
    }
  } else {
    result.className = 'gameover-result ' + (isDraw ? 'draw' : isWin ? 'win' : 'lose');
    result.textContent = isDraw ? '平  局' : isWin ? '胜  利' : '失  败';
    setStatusMsg(isDraw ? '平局' : isWin ? '你赢了！' : '你输了', isDraw ? 'draw' : isWin ? 'win' : 'lose');
  }

  sub.textContent = msg.message || '';

  const restartBtn = overlay.querySelector('.btn-restart');
  if (restartBtn) {
    if (isSpectator) {
      restartBtn.textContent = '查看棋盘';
      restartBtn.style.display = 'inline-block';
    } else {
      restartBtn.textContent = '再来一局';
      restartBtn.style.display = 'inline-block';
    }
  }

  // 分数
  try {
    const data = JSON.parse(msg.data);
    let scoresHtml = '';
    data.scores.forEach(p => {
      scoresHtml += `<div class="score-item">
        <div class="score-num">${p.wins}</div>
        <div class="score-label">${p.name.substring(0,6)} 胜</div>
      </div>`;
    });
    scores.innerHTML = scoresHtml;
  } catch(e) { scores.innerHTML = ''; }

  overlay.classList.add('show');
}

function handleGameChat(msg) {
  const isMe = msg.playerId === myId;
  addChat(msg.message, isMe ? 'me' : 'other', msg.playerName, isMe);
}

// ============================================================
// UI 更新
// ============================================================
function updatePlayerPanel() {
  let blackP = null, whiteP = null;
  let unassigned = [];
  for (const p of Object.values(players)) {
    if (p.stone === 1) blackP = p;
    else if (p.stone === 2) whiteP = p;
    else unassigned.push(p);
  }

  if (!blackP && unassigned.length > 0) blackP = unassigned.shift();
  if (!whiteP && unassigned.length > 0) whiteP = unassigned.shift();

  if (!blackP && myId && myId !== 'SPECTATOR' && gameState === 'WAITING') {
    blackP = { id: myId, name: myName || '你', stone: 0, wins: myWins || 0 };
  }

  const isSinglePlayer = Object.keys(players).length === 1 && myId !== 'SPECTATOR';
  const aiBtnHtml = isSinglePlayer ? `<div style="margin-top:16px;"><button class="btn-outline" style="padding:6px 12px;font-size:0.8rem;" onclick="addAI()">添加电脑</button></div>` : '';

  const blackEl = document.getElementById('player-black');
  if (blackP) {
    const isMe = blackP.id === myId;
    blackEl.innerHTML = `<div class="player-card">
      <div class="player-card-top">
        <div class="stone-icon black"></div>
        <div class="player-name ${isMe ? 'you' : ''}">${blackP.name}${isMe ? ' (你)' : ''}</div>
      </div>
      <div class="player-stats">
        <span>胜 ${blackP.wins}</span>
      </div>
      <div id="turn-black" style="display:none">
        <span class="turn-badge">● 落子中</span>
      </div>
    </div>`;
  } else {
    blackEl.innerHTML = `<div class="waiting-slot">等待玩家...${aiBtnHtml}</div>`;
  }

  const whiteEl = document.getElementById('player-white');
  if (whiteP) {
    const isMe = whiteP.id === myId;
    whiteEl.innerHTML = `<div class="player-card">
      <div class="player-card-top">
        <div class="stone-icon white"></div>
        <div class="player-name ${isMe ? 'you' : ''}">${whiteP.name}${isMe ? ' (你)' : ''}</div>
      </div>
      <div class="player-stats">
        <span>胜 ${whiteP.wins}</span>
      </div>
      <div id="turn-white" style="display:none">
        <span class="turn-badge">● 落子中</span>
      </div>
    </div>`;
  } else {
    whiteEl.innerHTML = `<div class="waiting-slot">等待玩家...${aiBtnHtml}</div>`;
  }
  
  if (gameState === 'PLAYING') {
    updateTurnStatus();
  }
}

function updateTurnStatus() {
  // 隐藏所有 turn badge
  ['black','white'].forEach(c => {
    const el = document.getElementById('turn-' + c);
    if (el) el.style.display = 'none';
  });

  const isMyTurn = currentTurn === myStone;
  const turnColor = currentTurn === 1 ? 'black' : 'white';
  const el = document.getElementById('turn-' + turnColor);
  if (el) el.style.display = 'block';

  if (isMyTurn) {
    setStatusMsg('你的回合，请落子', 'your-turn');
    canvas.style.cursor = 'crosshair';
  } else {
    setStatusMsg('等待对手落子...', 'opponent-turn');
    canvas.style.cursor = 'not-allowed';
  }
}

function setStatusMsg(text, cls) {
  const el = document.getElementById('status-msg');
  el.textContent = text;
  el.className = 'status-area ' + (cls || 'waiting');
}

function setStatus(connected, text) {
  document.getElementById('status-dot').className = 'status-dot' + (connected ? ' connected' : '');
  document.getElementById('status-text').textContent = text;
}

function addChat(text, type, name, isMe) {
  const container = document.getElementById('chat-messages');
  const div = document.createElement('div');

  if (type === 'system') {
    div.className = 'chat-msg system';
    div.textContent = text;
  } else {
    div.className = 'chat-msg';
    div.innerHTML = `<span class="msg-name ${type}">${name}：</span>${escHtml(text)}`;
  }

  container.appendChild(div);
  container.scrollTop = container.scrollHeight;
}

function escHtml(str) {
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// ============================================================
// 初始化
// ============================================================
drawBoard();

// 自动填充 WebSocket 地址
document.getElementById('ws-url').value = 'ws://' + window.location.hostname + ':8887';

// 回车加入
document.getElementById('player-name').addEventListener('keydown', e => {
  if (e.key === 'Enter') joinGame();
});
</script>
